<!DOCTYPE html>
<html lang="en" data-base="" data-page="events">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events — Fighting for a Free Future</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .placeholder-hero {
            background: var(--navy-deep);
            color: var(--text-on-dark);
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px var(--page-margin);
            position: relative;
            overflow: hidden;
        }

        .placeholder-hero::before {
            content: '';
            position: absolute;
            top: -200px; right: -200px;
            width: 700px; height: 700px;
            background: radial-gradient(circle, rgba(232, 88, 46, 0.07) 0%, transparent 65%);
            animation: flickerGlow 6s ease-in-out infinite;
            pointer-events: none;
        }

        .placeholder-inner {
            position: relative;
            z-index: 2;
            max-width: 600px;
        }

        .placeholder-inner h1 {
            font-family: var(--display);
            font-size: clamp(42px, 6vw, 72px);
            letter-spacing: 0.03em;
            line-height: 0.95;
            margin-bottom: 24px;
        }

        .placeholder-inner p {
            font-size: 18px;
            line-height: 1.6;
            color: var(--text-muted-on-dark);
            margin-bottom: 32px;
        }

        .placeholder-inner .back-link {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--orange);
            transition: color 0.2s ease;
        }

        .placeholder-inner .back-link:hover {
            color: var(--orange-glow);
        }
    </style>
</head>
<body>
    <div id="site-nav-root"></div>
    <script src="js/components.js"></script>

    <section class="placeholder-hero">
        <div class="placeholder-inner">
            <h1>I'VE NOT GOT ROUND TO THIS (YET)</h1>
            <p>Events are coming. We ran our first briefing event in November 2025 and there will be more. Watch this space.</p>
            <a href="index.html" class="back-link">← Back to homepage</a>
        </div>
    </section>
    <div id="site-footer-root"></div>

    <script src="js/main.js" defer></script>

</body>
</html>
